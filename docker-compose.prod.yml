version: '3.8'

networks:
  buraq-network:
    driver: bridge

volumes:
  postgres-data:
  chroma-data:
  ollama-data:
  uploads-data:

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - buraq-backend
      - buraq-ai-service
      - buraq-frontend
    networks:
      - buraq-network
    restart: unless-stopped

  buraq-backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/buraq-backend:${IMAGE_TAG:-latest}
    expose:
      - "8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - AI_SERVICE_URL=http://buraq-ai-service:8001
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - postgres
    networks:
      - buraq-network
    restart: unless-stopped

  buraq-ai-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/buraq-ai-service:${IMAGE_TAG:-latest}
    expose:
      - "8001"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SPRING_BOOT_URL=http://buraq-backend:8081
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    depends_on:
      - chromadb
      - ollama
    networks:
      - buraq-network
    restart: unless-stopped

  buraq-frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/buraq-frontend:${IMAGE_TAG:-latest}
    expose:
      - "80"
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - buraq-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - buraq-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - buraq-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - buraq-network
    restart: unless-stopped