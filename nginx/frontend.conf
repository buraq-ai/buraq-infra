server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle Angular HTML5 routing
    # try_files: first try the exact file, then directory, then fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year (they have hashed filenames in Angular)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html (it references the latest asset hashes)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}